<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Online School Survey System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI,Arial;
}

body{
margin:0;
background:#f1f5f9;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
background:#1e40af;
color:white;
padding:15px;
}

.navbar h2{
margin:0;
}

.navbar button{
background:white;
color:#1e40af;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
margin-left:8px;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/* CARD */

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

/* INPUTS */

input,select,textarea{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 14px;
background:#1e40af;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#1e40af;
color:white;
}

tr:nth-child(even){
background:#f1f5f9;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:20px;
}

.stat{
background:#1e40af;
color:white;
padding:20px;
border-radius:10px;
text-align:center;
}

.stat h2{
margin:0;
}

/* HIDE */

.hide{
display:none;
}

/* FOOTER */

.footer{
text-align:center;
padding:20px;
color:#666;
}

/* MOBILE */

@media(max-width:700px){

.navbar{
flex-direction:column;
gap:10px;
}

}

</style>
</head>

<body>

<div class="navbar">

<h2>🏫 School Survey System</h2>

<div>
<button onclick="showSurvey()">Survey</button>
<button onclick="showLogin()">Admin</button>
</div>

</div>

<div class="container">


<!-- SURVEY FORM -->

<div id="surveySection" class="card">

<h2>Student Survey Form</h2>

<input id="s_name" placeholder="Full Name">

<input id="s_class" placeholder="Class / Grade">

<select id="s_gender">
<option>Male</option>
<option>Female</option>
</select>

<label>Teacher Performance</label>

<select id="s_teachers">
<option>Excellent</option>
<option>Good</option>
<option>Average</option>
<option>Poor</option>
</select>

<label>School Facilities</label>

<select id="s_facilities">
<option>Excellent</option>
<option>Good</option>
<option>Average</option>
<option>Poor</option>
</select>

<textarea id="s_suggestion" placeholder="Suggestions"></textarea>

<button onclick="submitSurvey()">Submit Survey</button>

</div>


<!-- LOGIN -->

<div id="loginSection" class="card hide">

<h2>Admin Login</h2>

<input id="adminUser" placeholder="Username">

<input id="adminPass" type="password" placeholder="Password">

<button onclick="adminLogin()">Login</button>



</div>


<!-- ADMIN DASHBOARD -->

<div id="adminSection" class="hide">

<h2>Admin Dashboard</h2>

<button onclick="showSurvey()">Logout</button>
<button onclick="exportExcel()">Export CSV</button>
<button onclick="printReport()">Print</button>
<button onclick="clearAll()">Clear Data</button>

<br><br>

<input id="searchBox" placeholder="Search name or class" onkeyup="loadResults()">



<!-- STATS -->

<div class="stats">

<div class="stat">
<h2 id="totalSurvey">0</h2>
<p>Total Surveys</p>
</div>

<div class="stat">
<h2 id="maleCount">0</h2>
<p>Male Students</p>
</div>

<div class="stat">
<h2 id="femaleCount">0</h2>
<p>Female Students</p>
</div>

</div>


<!-- TABLE -->

<table id="resultTable">

<tr>
<th>#</th>
<th>Name</th>
<th>Class</th>
<th>Gender</th>
<th>Teachers</th>
<th>Facilities</th>
<th>Suggestion</th>
<th>Action</th>
</tr>

</table>



<h3>Survey Analytics</h3>

<canvas id="teacherChart"></canvas>
<br>
<canvas id="facilityChart"></canvas>

</div>

</div>

<div class="footer">
Online School Survey System<br>
<p>© 2026 Gideon Kipchirchir</p>
</div>



<script>

let surveyData = JSON.parse(localStorage.getItem("surveyData")) || [];


/* SURVEY */

function submitSurvey(){

let data = {

name:s_name.value,
class:s_class.value,
gender:s_gender.value,
teachers:s_teachers.value,
facilities:s_facilities.value,
suggestion:s_suggestion.value

}

if(data.name===""){
alert("Enter your name")
return
}

surveyData.push(data)

localStorage.setItem("surveyData",JSON.stringify(surveyData))

alert("Survey submitted successfully")

s_name.value=""
s_class.value=""
s_suggestion.value=""

}



/* SHOW SECTIONS */

function showLogin(){
surveySection.classList.add("hide")
loginSection.classList.remove("hide")
}

function showSurvey(){
adminSection.classList.add("hide")
loginSection.classList.add("hide")
surveySection.classList.remove("hide")
}



/* LOGIN */

function adminLogin(){

if(adminUser.value==="admin" && adminPass.value==="admin123"){

loginSection.classList.add("hide")

adminSection.classList.remove("hide")

loadResults()

drawCharts()

updateStats()

}

else{

alert("Wrong login")

}

}



/* LOAD TABLE */

function loadResults(){

let table=resultTable

table.innerHTML=`<tr>
<th>#</th>
<th>Name</th>
<th>Class</th>
<th>Gender</th>
<th>Teachers</th>
<th>Facilities</th>
<th>Suggestion</th>
<th>Action</th>
</tr>`

let filter=searchBox.value.toLowerCase()

surveyData.forEach((d,i)=>{

if(d.name.toLowerCase().includes(filter) || d.class.toLowerCase().includes(filter)){

let row=table.insertRow()

row.insertCell(0).innerText=i+1
row.insertCell(1).innerText=d.name
row.insertCell(2).innerText=d.class
row.insertCell(3).innerText=d.gender
row.insertCell(4).innerText=d.teachers
row.insertCell(5).innerText=d.facilities
row.insertCell(6).innerText=d.suggestion
row.insertCell(7).innerHTML=`<button onclick="deleteRecord(${i})">Delete</button>`

}

})

}



/* DELETE */

function deleteRecord(i){

surveyData.splice(i,1)

localStorage.setItem("surveyData",JSON.stringify(surveyData))

loadResults()

drawCharts()

updateStats()

}



/* CLEAR */

function clearAll(){

if(confirm("Delete all data?")){

localStorage.removeItem("surveyData")

surveyData=[]

loadResults()

drawCharts()

updateStats()

}

}



/* EXPORT */

function exportExcel(){

let csv="Name,Class,Gender,Teachers,Facilities,Suggestion\n"

surveyData.forEach(d=>{

csv+=`${d.name},${d.class},${d.gender},${d.teachers},${d.facilities},${d.suggestion}\n`

})

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="survey_data.csv"

a.click()

}



/* PRINT */

function printReport(){

let w=window.open("")

w.document.write("<h2>Survey Report</h2><table border=1>")

surveyData.forEach(d=>{

w.document.write(`<tr><td>${d.name}</td><td>${d.class}</td><td>${d.teachers}</td></tr>`)

})

w.document.write("</table>")

w.print()

}



/* STATS */

function updateStats(){

totalSurvey.innerText=surveyData.length

maleCount.innerText=surveyData.filter(d=>d.gender==="Male").length

femaleCount.innerText=surveyData.filter(d=>d.gender==="Female").length

}



/* CHARTS */

let teacherChartObj,facilityChartObj

function drawCharts(){

let labels=["Excellent","Good","Average","Poor"]

let count=(k,v)=>surveyData.filter(d=>d[k]==v).length

let teacherData=labels.map(v=>count("teachers",v))

let facilityData=labels.map(v=>count("facilities",v))

if(teacherChartObj) teacherChartObj.destroy()
if(facilityChartObj) facilityChartObj.destroy()

teacherChartObj=new Chart(teacherChart,{

type:"bar",

data:{
labels:labels,
datasets:[{
label:"Teacher Ratings",
data:teacherData,
backgroundColor:["#22c55e","#3b82f6","#f59e0b","#ef4444"]
}]
}

})

facilityChartObj=new Chart(facilityChart,{

type:"pie",

data:{
labels:labels,
datasets:[{
data:facilityData,
backgroundColor:["#22c55e","#3b82f6","#f59e0b","#ef4444"]
}]
}

})

}

</script>

</body>
</html>
